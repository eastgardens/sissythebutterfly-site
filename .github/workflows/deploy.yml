# Deploy sissythebutterfly.com to GitHub Pages on every push to main.
# (Hosting note: WEBSITE-BUILD-SPEC D2 prefers Netlify for its native forms; the email form is
# 037-gated and MailerLite embeds work on any static host, so GH Pages carries the skeleton —
# revisit at 2.3d if Netlify's forms are actually needed.)
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  # Monthly rebuild so the build-time seasonal ribbon (src/config/season.ts) flips on its own,
  # even without a content push. 08:00 UTC on the 1st of each month.
  schedule:
    - cron: '0 8 1 * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: withastro/action@v3
        with:
          node-version: 22 # Astro 6 requires >=22.12; the action's default (20) fails

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
